{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h2 class="mb-4 text-center">Financial Visualizations</h2>

<div class="row">

<!-- Pie Chart -->
<div class="col-md-6">

<div class="card p-4 mb-4">

<h4 class="text-center mb-3">Expense Distribution</h4>

<canvas id="pieChart"></canvas>

</div>

</div>

<!-- Line Chart -->
<div class="col-md-6">

<div class="card p-4 mb-4">

<h4 class="text-center mb-3">Expense Trend</h4>

<canvas id="lineChart"></canvas>

</div>

</div>

</div>

</div>


<!-- ChartJS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

var labels = {{ labels|safe }};
var data = {{ data|safe }};



// PIE CHART

var pieCtx = document.getElementById('pieChart').getContext('2d');

new Chart(pieCtx, {

type: 'pie',

data: {

labels: labels,

datasets: [{

data: data,

backgroundColor: [

'#FF6384',

'#36A2EB',

'#FFCE56',

'#4BC0C0',

'#9966FF',

'#FF9F40'

]

}]

},

options: {

responsive: true,

plugins: {

legend: {

position: 'bottom'

}

}

}

});



// LINE CHART

var lineCtx = document.getElementById('lineChart').getContext('2d');

new Chart(lineCtx, {

type: 'line',

data: {

labels: labels,

datasets: [{

label: "Expense by Category",

data: data,

borderColor: "#007bff",

backgroundColor: "rgba(0,123,255,0.2)",

fill: true,

tension: 0.3

}]

},

options: {

responsive: true,

scales: {

y: {

beginAtZero: true

}

}

}

});

</script>

{% endblock %}
